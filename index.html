<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이미지 변환기 · Image Converter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface2: #242429;
      --border: #2e2e36;
      --accent: #7c6ff7;
      --accent-hover: #9b96f9;
      --text: #e8e8ed;
      --text-muted: #7a7a8a;
      --green: #4ade80;
      --red: #f87171;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header h1 span { color: var(--accent); }
    header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 14px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    /* ── 업로드 영역 ── */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 56px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(124, 111, 247, 0.06);
    }
    #drop-zone input { display: none; }
    #drop-zone .icon { font-size: 40px; margin-bottom: 12px; }
    #drop-zone h2 { font-size: 17px; font-weight: 600; }
    #drop-zone p { color: var(--text-muted); font-size: 13px; margin-top: 6px; }
    #drop-zone .browse-btn {
      display: inline-block;
      margin-top: 18px;
      padding: 9px 22px;
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #drop-zone .browse-btn:hover { background: var(--accent-hover); }

    /* ── 글로벌 설정 패널 ── */
    #settings-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-top: 16px;
      gap: 24px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    #settings-panel.visible { display: flex; }

    .setting-group { display: flex; flex-direction: column; gap: 8px; }
    .setting-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .format-btns { display: flex; gap: 6px; }
    .fmt-btn {
      padding: 7px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .fmt-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .fmt-btn:hover:not(.active) {
      border-color: var(--accent);
      color: var(--text);
    }

    .quality-wrap { display: flex; align-items: center; gap: 10px; min-width: 200px; }
    .quality-wrap input[type=range] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .quality-val {
      min-width: 36px;
      text-align: right;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
    }

    .action-btns { display: flex; gap: 10px; margin-left: auto; }
    .btn {
      padding: 9px 20px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .btn-outline:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-danger {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--red);
    }

    /* ── 이미지 그리드 ── */
    #image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
      margin-top: 20px;
    }

    .img-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s;
    }
    .img-card.done { border-color: var(--green); }
    .img-card.error { border-color: var(--red); }

    .img-card .thumb-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .img-card .thumb-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .img-card .card-body { padding: 12px 14px; }
    .img-card .filename {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }
    .size-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .size-arrow { color: var(--text-muted); }
    .size-after { font-weight: 600; }
    .size-after.smaller { color: var(--green); }
    .size-after.larger  { color: var(--red); }
    .reduction {
      margin-left: auto;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(74, 222, 128, 0.12);
      color: var(--green);
    }
    .reduction.up {
      background: rgba(248, 113, 113, 0.12);
      color: var(--red);
    }

    .card-footer {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      gap: 8px;
    }
    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 999px;
    }
    .status-badge.waiting  { background: rgba(122,122,138,0.15); color: var(--text-muted); }
    .status-badge.loading  { background: rgba(124,111,247,0.15); color: var(--accent); }
    .status-badge.done     { background: rgba(74,222,128,0.15); color: var(--green); }
    .status-badge.error    { background: rgba(248,113,113,0.15); color: var(--red); }

    .card-footer .dl-btn {
      margin-left: auto;
      padding: 5px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      display: none;
    }
    .card-footer .dl-btn:hover { opacity: 0.85; }
    .card-footer .dl-btn.visible { display: block; }

    .remove-btn {
      position: absolute;
      top: 8px; right: 8px;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      border: none;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .img-card:hover .remove-btn { opacity: 1; }

    /* ── 하단 액션바 ── */
    #bottom-bar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(15,15,17,0.92);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      z-index: 100;
    }
    #bottom-bar.visible { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    #bottom-bar .info { font-size: 13px; color: var(--text-muted); }
    #bottom-bar .info strong { color: var(--text); }
    #bottom-bar .bar-btns { display: flex; gap: 10px; }

    /* ── 로딩 스피너 ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    #empty-tip {
      display: none;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 32px;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>이미지 <span>변환 · 압축</span> 도구</h1>
    <p>PNG · JPG · WebP 변환 및 품질 압축 · GIF → WebM 변환 — 모든 처리는 브라우저에서 이루어집니다</p>
  </header>

  <!-- 업로드 영역 -->
  <div id="drop-zone">
    <input type="file" id="file-input" accept="image/*" multiple />
    <div class="icon">🖼️</div>
    <h2>이미지를 드래그하거나 클릭하여 업로드</h2>
    <p>PNG, JPG, WebP, GIF, BMP, SVG 지원 · 여러 파일 동시 업로드 가능</p>
    <div class="browse-btn" id="browse-btn">파일 선택</div>
  </div>

  <!-- 글로벌 설정 -->
  <div id="settings-panel">
    <div class="setting-group">
      <label>출력 포맷</label>
      <div class="format-btns">
        <button class="fmt-btn active" data-fmt="image/jpeg">JPG</button>
        <button class="fmt-btn" data-fmt="image/png">PNG</button>
        <button class="fmt-btn" data-fmt="image/webp">WebP</button>
        <button class="fmt-btn" data-fmt="video/webm" title="GIF 파일만 WebM으로 변환됩니다">WebM <span style="font-size:10px;opacity:0.65;font-weight:500">GIF전용</span></button>
      </div>
    </div>
    <div class="setting-group">
      <label>품질 (JPG · WebP)</label>
      <div class="quality-wrap">
        <input type="range" id="quality-slider" min="1" max="100" value="85" />
        <span class="quality-val" id="quality-val">85</span>
      </div>
    </div>
    <div class="action-btns">
      <button class="btn btn-outline btn-danger" id="clear-btn">전체 삭제</button>
      <button class="btn btn-primary" id="convert-all-btn">전체 변환</button>
    </div>
  </div>

  <!-- 이미지 그리드 -->
  <div id="image-grid"></div>
  <div id="empty-tip">이미지를 추가하면 여기에 표시됩니다.</div>
</div>

<!-- 하단 고정 바 -->
<div id="bottom-bar">
  <div class="info">
    <strong id="bar-count">0</strong>개 이미지 · 변환 완료:
    <strong id="bar-done">0</strong>개
  </div>
  <div class="bar-btns">
    <button class="btn btn-outline" id="convert-all-btn2">전체 변환</button>
    <button class="btn btn-primary" id="download-zip-btn">ZIP으로 모두 다운로드</button>
  </div>
</div>

<script>
(function () {
  // ── 상태 ──
  const items = []; // { id, file, img, blob, status }
  let nextId = 0;
  let selectedFmt = 'image/jpeg';
  let quality = 0.85;

  const extMap = { 'image/jpeg': 'jpg', 'image/png': 'png', 'image/webp': 'webp', 'video/webm': 'webm' };

  // ── DOM ──
  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const browseBtn   = document.getElementById('browse-btn');
  const settingsPanel = document.getElementById('settings-panel');
  const grid        = document.getElementById('image-grid');
  const emptyTip    = document.getElementById('empty-tip');
  const qualitySlider = document.getElementById('quality-slider');
  const qualityVal  = document.getElementById('quality-val');
  const clearBtn    = document.getElementById('clear-btn');
  const convertAllBtn  = document.getElementById('convert-all-btn');
  const convertAllBtn2 = document.getElementById('convert-all-btn2');
  const downloadZipBtn = document.getElementById('download-zip-btn');
  const bottomBar   = document.getElementById('bottom-bar');
  const barCount    = document.getElementById('bar-count');
  const barDone     = document.getElementById('bar-done');

  // ── 드래그&드롭 ──
  browseBtn.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('click', (e) => {
    if (e.target === browseBtn || browseBtn.contains(e.target)) return;
    fileInput.click();
  });
  fileInput.addEventListener('change', () => addFiles(fileInput.files));
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });

  // ── 포맷 버튼 ──
  document.querySelectorAll('.fmt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedFmt = btn.dataset.fmt;
    });
  });

  // ── 품질 슬라이더 ──
  qualitySlider.addEventListener('input', () => {
    quality = qualitySlider.value / 100;
    qualityVal.textContent = qualitySlider.value;
  });

  // ── 전체 삭제 ──
  clearBtn.addEventListener('click', () => {
    items.length = 0;
    grid.innerHTML = '';
    updateUI();
  });

  // ── 전체 변환 ──
  convertAllBtn.addEventListener('click', convertAll);
  convertAllBtn2.addEventListener('click', convertAll);

  // ── ZIP 다운로드 ──
  downloadZipBtn.addEventListener('click', downloadZip);

  // ── 파일 추가 ──
  function addFiles(files) {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const item = { id: nextId++, file, blob: null, status: 'waiting' };
      items.push(item);
      renderCard(item);
    });
    updateUI();
  }

  // ── 카드 렌더링 ──
  function renderCard(item) {
    const card = document.createElement('div');
    card.className = 'img-card';
    card.id = 'card-' + item.id;
    card.innerHTML = `
      <button class="remove-btn" data-id="${item.id}" title="제거">✕</button>
      <div class="thumb-wrap">
        <img id="thumb-${item.id}" alt="" />
      </div>
      <div class="card-body">
        <div class="filename" title="${item.file.name}">${item.file.name}</div>
        <div class="size-row">
          <span id="size-before-${item.id}">${fmtSize(item.file.size)}</span>
          <span class="size-arrow">→</span>
          <span class="size-after" id="size-after-${item.id}">—</span>
          <span class="reduction" id="reduction-${item.id}" style="display:none"></span>
        </div>
      </div>
      <div class="card-footer">
        <span class="status-badge waiting" id="badge-${item.id}">대기 중</span>
        <button class="dl-btn" id="dl-${item.id}">다운로드</button>
      </div>
    `;
    grid.appendChild(card);

    // 썸네일 로드
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('thumb-' + item.id);
      if (img) img.src = e.target.result;
      item.objectUrl = e.target.result;
    };
    reader.readAsDataURL(item.file);

    // 개별 다운로드
    card.querySelector('.dl-btn').addEventListener('click', () => downloadSingle(item));
    // 카드 제거
    card.querySelector('.remove-btn').addEventListener('click', () => removeItem(item.id));
  }

  // ── 카드 제거 ──
  function removeItem(id) {
    const idx = items.findIndex(i => i.id === id);
    if (idx !== -1) items.splice(idx, 1);
    const card = document.getElementById('card-' + id);
    if (card) card.remove();
    updateUI();
  }

  // ── GIF 총 재생 시간 파싱 ──
  function getGifDurationMs(buffer) {
    const data = new Uint8Array(buffer);
    let ms = 0;
    for (let i = 0; i < data.length - 5; i++) {
      // Graphic Control Extension: 0x21 0xF9 0x04
      if (data[i] === 0x21 && data[i+1] === 0xF9 && data[i+2] === 0x04) {
        const delay = (data[i+4] | (data[i+5] << 8)) * 10; // 1/100s → ms
        ms += delay || 100; // delay=0인 프레임은 100ms로 처리
        i += 7;
      }
    }
    return ms || 1000;
  }

  // ── GIF → WebM 변환 ──
  async function convertGifToWebm(item) {
    setStatus(item, 'loading');
    return new Promise(async (resolve) => {
      if (!window.MediaRecorder) {
        setStatus(item, 'error');
        resolve(); return;
      }
      const buffer = await item.file.arrayBuffer();
      const durationMs = getGifDurationMs(buffer);
      const objectUrl = URL.createObjectURL(item.file);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width  = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
          ? 'video/webm;codecs=vp9' : 'video/webm';
        let stream, recorder;
        try {
          stream   = canvas.captureStream(30);
          recorder = new MediaRecorder(stream, { mimeType });
        } catch (e) {
          setStatus(item, 'error');
          URL.revokeObjectURL(objectUrl);
          resolve(); return;
        }
        const chunks = [];
        recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = () => {
          item.blob = new Blob(chunks, { type: 'video/webm' });
          item.outputFmt = 'video/webm';
          setStatus(item, 'done');
          updateSizeInfo(item);
          updateBottomBar();
          URL.revokeObjectURL(objectUrl);
          resolve();
        };
        recorder.start();
        let startTime = null;
        function draw(ts) {
          if (!startTime) startTime = ts;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
          if (ts - startTime < durationMs) {
            requestAnimationFrame(draw);
          } else {
            recorder.stop();
          }
        }
        requestAnimationFrame(draw);
      };
      img.onerror = () => { setStatus(item, 'error'); URL.revokeObjectURL(objectUrl); resolve(); };
      img.src = objectUrl;
    });
  }

  // ── 변환 (단일) ──
  async function convertItem(item) {
    if (selectedFmt === 'video/webm') {
      if (item.file.type !== 'image/gif') {
        setStatus(item, 'error');
        const badge = document.getElementById('badge-' + item.id);
        if (badge) { badge.title = 'GIF 파일만 WebM으로 변환할 수 있습니다'; badge.textContent = 'GIF만 가능'; }
        return;
      }
      return convertGifToWebm(item);
    }
    setStatus(item, 'loading');
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        // PNG가 아닌 포맷의 투명도 처리
        if (selectedFmt === 'image/jpeg') {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        ctx.drawImage(img, 0, 0);
        canvas.toBlob(blob => {
          if (!blob) { setStatus(item, 'error'); resolve(); return; }
          item.blob = blob;
          item.outputFmt = selectedFmt;
          setStatus(item, 'done');
          updateSizeInfo(item);
          updateBottomBar();
          resolve();
        }, selectedFmt, quality);
      };
      img.onerror = () => { setStatus(item, 'error'); resolve(); };
      img.src = item.objectUrl;
    });
  }

  // ── 전체 변환 ──
  async function convertAll() {
    for (const item of items) {
      await convertItem(item);
    }
    updateBottomBar();
  }

  // ── 단일 다운로드 ──
  function downloadSingle(item) {
    if (!item.blob) return;
    const ext = extMap[item.outputFmt] || 'jpg';
    const base = item.file.name.replace(/\.[^.]+$/, '');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(item.blob);
    a.download = `${base}.${ext}`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // ── ZIP 다운로드 ──
  async function downloadZip() {
    const done = items.filter(i => i.status === 'done' && i.blob);
    if (done.length === 0) { alert('변환된 이미지가 없습니다. 먼저 변환을 실행하세요.'); return; }
    downloadZipBtn.textContent = '압축 중…';
    downloadZipBtn.disabled = true;
    const zip = new JSZip();
    done.forEach(item => {
      const ext = extMap[item.outputFmt] || 'jpg';
      const base = item.file.name.replace(/\.[^.]+$/, '');
      zip.file(`${base}.${ext}`, item.blob);
    });
    const content = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = 'converted_images.zip';
    a.click();
    URL.revokeObjectURL(a.href);
    downloadZipBtn.textContent = 'ZIP으로 모두 다운로드';
    downloadZipBtn.disabled = false;
  }

  // ── 상태 업데이트 ──
  function setStatus(item, status) {
    item.status = status;
    const badge = document.getElementById('badge-' + item.id);
    const card  = document.getElementById('card-' + item.id);
    if (!badge) return;
    badge.className = 'status-badge ' + status;
    const labels = { waiting: '대기 중', loading: '변환 중', done: '완료', error: '오류' };
    badge.textContent = status === 'loading' ? '' : labels[status];
    if (status === 'loading') {
      const sp = document.createElement('span');
      sp.className = 'spinner';
      badge.appendChild(sp);
    }
    card.className = 'img-card' + (status === 'done' ? ' done' : status === 'error' ? ' error' : '');
    const dlBtn = document.getElementById('dl-' + item.id);
    if (dlBtn) dlBtn.classList.toggle('visible', status === 'done');
  }

  function updateSizeInfo(item) {
    const afterEl   = document.getElementById('size-after-' + item.id);
    const redEl     = document.getElementById('reduction-' + item.id);
    if (!afterEl || !item.blob) return;
    const before = item.file.size;
    const after  = item.blob.size;
    const diff   = Math.round((1 - after / before) * 100);
    afterEl.textContent = fmtSize(after);
    afterEl.className = 'size-after ' + (after < before ? 'smaller' : 'larger');
    redEl.style.display = '';
    redEl.className = 'reduction' + (diff >= 0 ? '' : ' up');
    redEl.textContent = diff >= 0 ? `-${diff}%` : `+${Math.abs(diff)}%`;
  }

  function updateUI() {
    const hasItems = items.length > 0;
    settingsPanel.classList.toggle('visible', hasItems);
    bottomBar.classList.toggle('visible', hasItems);
    emptyTip.style.display = !hasItems ? 'block' : 'none';
    updateBottomBar();
  }

  function updateBottomBar() {
    barCount.textContent = items.length;
    barDone.textContent  = items.filter(i => i.status === 'done').length;
  }

  function fmtSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
  }
})();
</script>
</body>
</html>
